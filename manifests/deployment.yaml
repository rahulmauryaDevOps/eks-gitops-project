apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment
  namespace: nginx-project

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        ports:
        - containerPort: 80

        env:
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: nginx-config
              key: ENV

        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: nginx-config
              key: APP_NAME

        - name: USERNAME
          valueFrom:
            secretKeyRef:
              name: nginx-secret
              key: username

        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: nginx-secret
              key: password